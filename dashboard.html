<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>ATNOC - Dashboard</title><link rel="stylesheet" href="style.css"/></head><body><header class="header"><div class="brand"><h1>ATNOC - Dashboard</h1><p>Monitoramento dos atendimentos registrados</p></div><nav class="nav"><a href="registro.html">Abrir Registro</a></nav></header><main class="main"><div class="filters card"><label>Data<input type="date" id="filtroData"/></label><label>Tipo<select id="filtroTipo"></select></label><label>Status<select id="filtroStatus"></select></label><label>Atendente<input id="filtroAtendente" type="text" placeholder="Filtrar por atendente"/></label><button id="atualizar" class="primary">Atualizar</button></div><section class="stats"><div class="card stat"><strong id="total">0</strong><span>Total no filtro</span></div><div class="card stat"><strong id="totalHoje">0</strong><span>Total hoje</span></div><div class="card stat"><strong id="tipoMais">-</strong><span>Tipo mais comum</span></div><div class="card stat"><strong id="pendentes">0</strong><span>Pendentes/encaminhados</span></div></section><section class="grid" style="grid-template-columns:repeat(auto-fit,minmax(300px,1fr));"><div class="card"><h2>Por tipo</h2><div id="porTipo"></div></div><div class="card"><h2>Por status</h2><div id="porStatus"></div></div><div class="card"><h2>Por atendente</h2><div id="porAtendente"></div></div></section><section class="card" style="margin-top:18px;"><h2>Registros</h2><div class="table-wrap" id="tabela"></div></section></main><script type="module" src="dashboard.js"></script></body></html>
