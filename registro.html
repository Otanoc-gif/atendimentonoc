<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>ATNOC - Registro Rápido</title><link rel="stylesheet" href="style.css"/></head><body><header class="header"><div class="brand"><h1>ATNOC - Registro Rápido</h1><p>Painel para marcar atendimentos por tipo</p></div><nav class="nav"><a href="dashboard.html">Abrir Dashboard</a></nav></header><main class="main"><div class="alert">⚠️ Não inserir CPF, senha, e-mail, endereço completo ou dados financeiros. Use apenas controle operacional.</div><section class="card"><h2>Informações opcionais</h2><div class="form-grid"><label>Atendente<input id="atendente" type="text" placeholder="Seu nome"/></label><label>Canal<select id="canal"><option>Chat</option><option>WhatsApp</option><option>Telefone</option><option>Presencial</option><option>Interno</option></select></label><label>Bairro/Região<input id="bairro" type="text" placeholder="Opcional"/></label><label>Status<select id="status"><option>Registrado</option><option>Resolvido</option><option>Pendente</option><option>Encaminhado</option></select></label><label class="full">Observação rápida<textarea id="obs" placeholder="Opcional. Ex: cliente reclamou de lentidão no Wi-Fi, IPTV travando..."></textarea></label></div></section><section style="margin-top:18px;"><h2>Registrar atendimento</h2><div id="botoesTipos" class="grid buttons"></div></section><section class="card" style="margin-top:18px;"><h2>Últimos registros</h2><div id="ultimos"></div></section></main><div id="toast" class="toast">Registrado!</div><script type="module" src="registro.js"></script></body></html>
